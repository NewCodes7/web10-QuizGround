services:
  loki:
    image: grafana/loki:2.9.10
    container_name: quizground-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: quizground-prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.0.0
    container_name: quizground-grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-pyroscope-app
      - GF_PLUGIN_GRAFANA_PYROSCOPE_APP_ENABLED=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - loki
      - pyroscope
    networks:
      - monitoring

  redis_exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: quizground-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://${REDIS_INTERNAL_IP}:6379
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - monitoring

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: quizground-nginx-exporter
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - '-nginx.scrape-uri=http://host.docker.internal:8080/stub_status'
    networks:
      - monitoring

  pyroscope:
    image: grafana/pyroscope:1.7.1
    container_name: quizground-pyroscope
    restart: unless-stopped
    # 0.0.0.0으로 바인딩: node-1/node-2 VM이 VPC 내부 IP로 프로파일을 push해야 함
    # GCP 방화벽에서 4040 포트를 VPC 내부(10.10.0.0/16)에서만 허용할 것
    ports:
      - "4040:4040"
    volumes:
      - pyroscope_data:/data
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  pyroscope_data:

networks:
  monitoring:
    driver: bridge
