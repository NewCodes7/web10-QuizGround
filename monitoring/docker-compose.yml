services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: quizground-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.3
    container_name: quizground-grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  redis_exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: quizground-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://${REDIS_INTERNAL_IP}:6379
    ports:
      - "127.0.0.1:9121:9121"
    networks:
      - monitoring

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: quizground-nginx-exporter
    restart: unless-stopped
    command:
      - '-nginx.scrape-uri=http://${NGINX_INTERNAL_IP}:8080/stub_status'
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
