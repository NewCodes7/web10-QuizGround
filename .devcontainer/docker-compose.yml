services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: test_db
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-ptest']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  workspace:
    image: mcr.microsoft.com/devcontainers/javascript-node:24-bookworm
    volumes:
      - ..:/workspaces/web10-QuizGround:cached
    command: sleep infinity
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWD: test
      DB_NAME: test_db
      DB_HOST_TEST: mysql
      DB_PORT_TEST: 3306
      DB_USER_TEST: root
      DB_PASSWD_TEST: test
      DB_NAME_TEST: test_db
      REDIS_URL: redis://redis:6379
      DEV: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
