name: Deploy to GCE (Distributed)

on:
  push:
    branches: ["release"]

env:
  NODE_ENV: test
  DB_HOST_TEST: localhost
  DB_PORT_TEST: 3306
  DB_PASSWD_TEST: test
  DB_NAME_TEST: test_db

jobs:
  # ── 1. 빌드 & 테스트 ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_db
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: BE 의존성 설치
        working-directory: ./BE
        run: npm ci

      - name: FE 의존성 설치
        working-directory: ./FE
        run: npm ci

      - name: 프로덕션 .env 생성
        run: |
          echo '${{ secrets.ENV }}' > .env

      - name: DEBUG_TOKEN 별도 Secret 주입 (선택)
        env:
          DEBUG_TOKEN: ${{ secrets.DEBUG_TOKEN }}
        run: |
          if [ -n "$DEBUG_TOKEN" ]; then
            sed -i '/^DEBUG_TOKEN=/d' .env
            echo "DEBUG_TOKEN=$DEBUG_TOKEN" >> .env
          fi

      - name: CORS_ORIGIN 별도 Secret 주입 (선택)
        env:
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: |
          if [ -n "$CORS_ORIGIN" ]; then
            sed -i '/^CORS_ORIGIN=/d' .env
            echo "CORS_ORIGIN=$CORS_ORIGIN" >> .env
          fi

      # 테스트 활성화 시 주석 해제
      # - name: BE 단위 테스트
      #   working-directory: ./BE
      #   run: npm run test

      # - name: BE 통합 테스트
      #   working-directory: ./BE
      #   run: npm run test:integration

      - name: BE 빌드
        working-directory: ./BE
        run: npm run build

      - name: FE 빌드
        working-directory: ./FE
        env:
          VITE_NODE1_URL: http://${{ secrets.GCE_EXTERNAL_IP_NODE1 }}:1027
          VITE_NODE2_URL: http://${{ secrets.GCE_EXTERNAL_IP_NODE2 }}:1027
        run: npm run build

      - name: BE 배포 패키지 생성 (be.tar.gz)
        run: |
          tar -czf be.tar.gz \
            .env \
            BE/dist \
            BE/package.json \
            BE/package-lock.json \
            BE/ecosystem.config.js \
            scripts/was-deploy.sh

      - name: FE 배포 패키지 생성 (fe.tar.gz)
        run: |
          tar -czf fe.tar.gz \
            FE/dist \
            scripts/nginx-deploy.sh

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            be.tar.gz
            fe.tar.gz
          retention-days: 1

  # ── 2. node-1 배포 ──────────────────────────────────────────────
  # ProxyJump(TCP forwarding) 대신 nginx-bastion에서 직접 SSH 실행
  # GitHub Actions → nginx(외부IP) → node1(내부IP) 2단계 연결
  deploy-node1:
    name: Deploy to node-1
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SSH 설정 (nginx 직접)
        env:
          SSH_KEY: ${{ secrets.GCE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          {
            echo "Host nginx"
            echo "  HostName ${{ secrets.GCE_HOST_NGINX }}"
            echo "  User ${{ secrets.GCE_USERNAME }}"
            echo "  IdentityFile ~/.ssh/id_rsa"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile /dev/null"
            echo "  ServerAliveInterval 60"
            echo "  ServerAliveCountMax 10"
            echo "  ConnectTimeout 30"
            echo "  ForwardAgent yes"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          # SSH_AUTH_SOCK을 다음 step에서도 사용할 수 있도록 전달
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: nginx 경유 node-1 배포
        run: |
          # be.tar.gz를 nginx-bastion 임시 디렉토리로 전송
          ssh nginx "rm -rf ~/node1-deploy-tmp && mkdir -p ~/node1-deploy-tmp"
          scp be.tar.gz nginx:~/node1-deploy-tmp/

          # nginx-bastion에서 node-1으로 배포 (agent forwarding 활용)
          ssh -A nginx "
            set -e
            N1='${{ secrets.GCE_USERNAME }}@${{ secrets.GCE_INTERNAL_IP_NODE1 }}'
            O='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60'
            ssh \$O \$N1 'rm -rf ~/quizground/tobe && mkdir -p ~/quizground/tobe'
            scp \$O ~/node1-deploy-tmp/be.tar.gz \$N1:~/quizground/tobe/
            ssh \$O \$N1 '
              set -e
              cd ~/quizground/tobe
              tar -xzf be.tar.gz
              rm be.tar.gz
              echo PYROSCOPE_INSTANCE=node1 >> .env
              chmod +x scripts/was-deploy.sh
              bash scripts/was-deploy.sh
            '
            rm -rf ~/node1-deploy-tmp
          "

  # ── 3. node-2 배포 (node-1 완료 후 순차 실행 → rolling deploy) ──
  deploy-node2:
    name: Deploy to node-2
    needs: deploy-node1
    runs-on: ubuntu-latest

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SSH 설정 (nginx 직접)
        env:
          SSH_KEY: ${{ secrets.GCE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          {
            echo "Host nginx"
            echo "  HostName ${{ secrets.GCE_HOST_NGINX }}"
            echo "  User ${{ secrets.GCE_USERNAME }}"
            echo "  IdentityFile ~/.ssh/id_rsa"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile /dev/null"
            echo "  ServerAliveInterval 60"
            echo "  ServerAliveCountMax 10"
            echo "  ConnectTimeout 30"
            echo "  ForwardAgent yes"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          # SSH_AUTH_SOCK을 다음 step에서도 사용할 수 있도록 전달
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: nginx 경유 node-2 배포
        run: |
          # be.tar.gz를 nginx-bastion 임시 디렉토리로 전송
          ssh nginx "rm -rf ~/node2-deploy-tmp && mkdir -p ~/node2-deploy-tmp"
          scp be.tar.gz nginx:~/node2-deploy-tmp/

          # nginx-bastion에서 node-2으로 배포 (agent forwarding 활용)
          ssh -A nginx "
            set -e
            N2='${{ secrets.GCE_USERNAME }}@${{ secrets.GCE_INTERNAL_IP_NODE2 }}'
            O='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60'
            ssh \$O \$N2 'rm -rf ~/quizground/tobe && mkdir -p ~/quizground/tobe'
            scp \$O ~/node2-deploy-tmp/be.tar.gz \$N2:~/quizground/tobe/
            ssh \$O \$N2 '
              set -e
              cd ~/quizground/tobe
              tar -xzf be.tar.gz
              rm be.tar.gz
              echo PYROSCOPE_INSTANCE=node2 >> .env
              chmod +x scripts/was-deploy.sh
              bash scripts/was-deploy.sh
            '
            rm -rf ~/node2-deploy-tmp
          "

  # ── 4. nginx 배포 (WAS 양쪽 완료 후) ────────────────────────────
  deploy-nginx:
    name: Deploy to nginx
    needs: deploy-node2
    runs-on: ubuntu-latest

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SSH 설정
        env:
          SSH_KEY: ${{ secrets.GCE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          {
            echo "Host nginx"
            echo "  HostName ${{ secrets.GCE_HOST_NGINX }}"
            echo "  User ${{ secrets.GCE_USERNAME }}"
            echo "  IdentityFile ~/.ssh/id_rsa"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile /dev/null"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: fe.tar.gz 전송
        run: |
          ssh nginx "mkdir -p ~/quizground/tobe"
          scp fe.tar.gz nginx:~/quizground/tobe/

      - name: nginx 배포 실행
        run: |
          ssh nginx "
            set -e
            cd ~/quizground/tobe
            tar -xzf fe.tar.gz
            rm fe.tar.gz
            chmod +x scripts/nginx-deploy.sh
            bash scripts/nginx-deploy.sh
          "
