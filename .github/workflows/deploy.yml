name: Deploy to GCE (Distributed)

on:
  push:
    branches: ["release"]

env:
  NODE_ENV: test
  DB_HOST_TEST: localhost
  DB_PORT_TEST: 3306
  DB_PASSWD_TEST: test
  DB_NAME_TEST: test_db

jobs:
  # ── 1. 빌드 & 테스트 ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_db
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: BE 의존성 설치
        working-directory: ./BE
        run: npm ci

      - name: FE 의존성 설치
        working-directory: ./FE
        run: npm ci

      - name: 프로덕션 .env 생성
        run: echo '${{ secrets.ENV }}' > .env

      # 테스트 활성화 시 주석 해제
      # - name: BE 단위 테스트
      #   working-directory: ./BE
      #   run: npm run test

      # - name: BE 통합 테스트
      #   working-directory: ./BE
      #   run: npm run test:integration

      - name: BE 빌드
        working-directory: ./BE
        run: npm run build

      - name: FE 빌드
        working-directory: ./FE
        run: npm run build

      - name: BE 배포 패키지 생성 (be.tar.gz)
        run: |
          tar -czf be.tar.gz \
            .env \
            BE/dist \
            BE/package.json \
            BE/package-lock.json \
            BE/ecosystem.config.js \
            scripts/was-deploy.sh

      - name: FE 배포 패키지 생성 (fe.tar.gz)
        run: |
          tar -czf fe.tar.gz \
            FE/dist \
            scripts/nginx-deploy.sh

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            be.tar.gz
            fe.tar.gz
          retention-days: 1

  # ── 2. node-1 배포 ──────────────────────────────────────────────
  # node-1/2는 외부 IP 없음 → nginx VM을 jump host(bastion)로 경유
  deploy-node1:
    name: Deploy to node-1
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SSH 설정 (nginx bastion 경유)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCE_HOST_NGINX }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host nginx-bastion
            HostName ${{ secrets.GCE_HOST_NGINX }}
            User ${{ secrets.GCE_USERNAME }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host node1
            HostName ${{ secrets.GCE_INTERNAL_IP_NODE1 }}
            User ${{ secrets.GCE_USERNAME }}
            IdentityFile ~/.ssh/id_rsa
            ProxyJump nginx-bastion
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: be.tar.gz 전송
        run: |
          ssh node1 "mkdir -p ~/quizground/tobe"
          rsync -avz be.tar.gz node1:~/quizground/tobe/

      - name: node-1 배포 실행
        run: |
          ssh node1 "
            set -e
            cd ~/quizground/tobe
            tar -xzf be.tar.gz
            rm be.tar.gz
            chmod +x scripts/was-deploy.sh
            bash scripts/was-deploy.sh
          "

  # ── 3. node-2 배포 (node-1 완료 후 순차 실행 → rolling deploy) ──
  deploy-node2:
    name: Deploy to node-2
    needs: deploy-node1
    runs-on: ubuntu-latest

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SSH 설정 (nginx bastion 경유)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCE_HOST_NGINX }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host nginx-bastion
            HostName ${{ secrets.GCE_HOST_NGINX }}
            User ${{ secrets.GCE_USERNAME }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host node2
            HostName ${{ secrets.GCE_INTERNAL_IP_NODE2 }}
            User ${{ secrets.GCE_USERNAME }}
            IdentityFile ~/.ssh/id_rsa
            ProxyJump nginx-bastion
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: be.tar.gz 전송
        run: |
          ssh node2 "mkdir -p ~/quizground/tobe"
          rsync -avz be.tar.gz node2:~/quizground/tobe/

      - name: node-2 배포 실행
        run: |
          ssh node2 "
            set -e
            cd ~/quizground/tobe
            tar -xzf be.tar.gz
            rm be.tar.gz
            chmod +x scripts/was-deploy.sh
            bash scripts/was-deploy.sh
          "

  # ── 4. nginx 배포 (WAS 양쪽 완료 후) ────────────────────────────
  deploy-nginx:
    name: Deploy to nginx
    needs: deploy-node2
    runs-on: ubuntu-latest

    steps:
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: SSH 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCE_HOST_NGINX }} >> ~/.ssh/known_hosts

      - name: fe.tar.gz 전송
        run: |
          ssh ${{ secrets.GCE_USERNAME }}@${{ secrets.GCE_HOST_NGINX }} \
            "mkdir -p ~/quizground/tobe"
          rsync -avz fe.tar.gz \
            ${{ secrets.GCE_USERNAME }}@${{ secrets.GCE_HOST_NGINX }}:~/quizground/tobe/

      - name: nginx 배포 실행
        run: |
          ssh ${{ secrets.GCE_USERNAME }}@${{ secrets.GCE_HOST_NGINX }} \
            "set -e
            cd ~/quizground/tobe
            tar -xzf fe.tar.gz
            rm fe.tar.gz
            chmod +x scripts/nginx-deploy.sh
            NODE1_INTERNAL_IP=${{ secrets.GCE_INTERNAL_IP_NODE1 }} \
            NODE2_INTERNAL_IP=${{ secrets.GCE_INTERNAL_IP_NODE2 }} \
            bash scripts/nginx-deploy.sh"
